name: "🐛 Bug report"
description: "Something in Notulee isn't working as expected"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Notulee runs entirely in your browser, so the more
        detail you give, the faster we can reproduce and fix it.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: "I searched existing issues and this isn't a duplicate"
          required: true
        - label: "This is a bug — not a question or idea (those go to Discussions)"
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I…, Notulee…
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we make it happen?
      placeholder: |
        1. Open a new note
        2. Type …
        3. See …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: browser-os
    attributes:
      label: Browser & operating system
      placeholder: e.g. Firefox 128 on Windows 11
    validations:
      required: true
  - type: input
    id: loaded
    attributes:
      label: When did you last load Notulee?
      description: Notulee updates often — roughly when did you last load or refresh the app?
      placeholder: e.g. this morning, 2026-06-17
    validations:
      required: false
  - type: textarea
    id: console
    attributes:
      label: Console errors / screenshots
      description: Open your browser console (F12 → Console) and paste any red errors. Screenshots help too.
      render: shell
    validations:
      required: false
